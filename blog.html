  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 750, once: true, offset: 80 });
    const toggle = document.getElementById('navToggle');
    const mobileMenu = document.getElementById('mobileMenu');
    toggle.addEventListener('click', () => {
      mobileMenu.classList.toggle('open');
      toggle.classList.toggle('active');
    });
    document.querySelectorAll('.mobile-link').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.remove('open');
        toggle.classList.remove('active');
      });
    });
    window.addEventListener('scroll', () => {
      document.getElementById('topNav').classList.toggle('scrolled', window.scrollY > 20);
    });

    // ── Hashnode dynamic posts ──────────────────────────────────
    (async function loadBlogPosts() {
      const HASHNODE_GQL = 'https://gql.hashnode.com';
      const BLOG_HOST    = 'abdelhamidr.hashnode.dev';

      const query = `{
        publication(host: "${BLOG_HOST}") {
          posts(first: 20) {
            edges {
              node {
                title
                brief
                slug
                publishedAt
                readTimeInMinutes
                coverImage { url }
              }
            }
          }
        }
      }`;

      function formatDate(iso) {
        return new Date(iso).toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric'
        }).toUpperCase();
      }

      function buildCard(post, index) {
        const url   = `https://${BLOG_HOST}/${post.slug}`;
        const date  = formatDate(post.publishedAt);
        const mins  = post.readTimeInMinutes || '?';
        const delay = (index % 6) * 50;

        const rawUrl = post.coverImage?.url || '';
        const imgUrl = rawUrl ? rawUrl.replace(/\?.*$/, '') + '?w=600&auto=compress,format' : '';
        const imgHtml = imgUrl
          ? `<img src="${imgUrl}" alt="${post.title.replace(/"/g,'&quot;')}" class="writing-img" loading="lazy" decoding="async">`
          : `<div style="width:100%;aspect-ratio:16/7;background:var(--card-bg);display:flex;align-items:center;justify-content:center;">
               <i class="fas fa-pen-nib" style="font-size:2rem;color:var(--text-dim);"></i>
             </div>`;

        return `
          <article class="writing-card" data-aos="fade-up" data-aos-delay="${delay}">
            <a href="${url}" target="_blank" rel="noopener noreferrer" class="writing-img-wrap">${imgHtml}</a>
            <div class="writing-body">
              <div class="writing-meta">${date} <span class="writing-dot">•</span> ${mins} MIN READ</div>
              <h3 class="writing-title">${post.title}</h3>
              <a href="${url}" target="_blank" rel="noopener noreferrer" class="writing-read-link">READ ARTICLE</a>
            </div>
          </article>`;
      }

      try {
        const res   = await fetch(HASHNODE_GQL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });
        const json  = await res.json();
        const posts = json?.data?.publication?.posts?.edges?.map(e => e.node) || [];
        const grid  = document.getElementById('blogGrid');

        if (posts.length === 0) {
          grid.innerHTML = '';
          document.getElementById('blogEmpty').style.display = 'block';
          return;
        }

        grid.innerHTML = posts.map((p, i) => buildCard(p, i)).join('');
        AOS.refresh();
      } catch (err) {
        console.error('Failed to load blog posts:', err);
      }
    })();
  </script>
